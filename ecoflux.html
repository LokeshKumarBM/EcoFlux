<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EcoFlux Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
    }

    header {
      padding: 15px;
      background: #0f172a;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .cards {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      flex: 1;
      padding: 15px;
      border-radius: 10px;
      background: #1e293b;
      text-align: center;
    }

    .green { border: 2px solid #22c55e; }
    .blue { border: 2px solid #3b82f6; }
    .red { border: 2px solid #ef4444; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .metric-box {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .chart {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .bars {
      display: flex;
      align-items: flex-end;
      height: 120px;
      gap: 5px;
    }

    .bar {
      width: 10px;
      background: #22c55e;
    }

    .controls {
      display: flex;
      gap: 20px;
    }

    .control-box {
      flex: 1;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }

    button {
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>⚡ EcoFlux Live Dashboard</header>

<div class="container">

  <!-- Load Cards -->
  <div class="cards">
    <div class="card red">Important Load</div>
    <div class="card green">Essential Load</div>
    <div class="card blue">Non-Essential Load</div>
  </div>

  <!-- Metrics -->
  <div class="metrics">
    <div class="metric-box">Battery<br><b id="battery">78%</b></div>
    <div class="metric-box">Solar<br><b id="solar">4.2 kW</b></div>
    <div class="metric-box">Generator<br><b id="gen">OFF</b></div>
    <div class="metric-box">Load<br><b id="load">3.1 kW</b></div>
  </div>

  <!-- Chart -->
  <div class="chart">
    <h3>Energy Usage</h3>
    <div class="bars" id="bars"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="control-box">
      <h4>Mode Control</h4>
      <button onclick="toggleMode()">Toggle Mode</button>
      <p id="mode">Auto Mode</p>
    </div>

    <div class="control-box">
      <h4>Load Management</h4>
      <button onclick="toggleLoad()">Toggle Load</button>
      <p id="loadStatus">Priority Load ON</p>
    </div>
  </div>

</div>

<script>
  // Generate random chart bars
  const barsContainer = document.getElementById("bars");
  for (let i = 0; i < 20; i++) {
    let bar = document.createElement("div");
    bar.classList.add("bar");
    bar.style.height = Math.random() * 100 + "px";
    barsContainer.appendChild(bar);
  }

  function toggleMode() {
    let mode = document.getElementById("mode");
    mode.innerText = mode.innerText === "Auto Mode" ? "Manual Mode" : "Auto Mode";
  }

  function toggleLoad() {
    let load = document.getElementById("loadStatus");
    load.innerText = load.innerText === "Priority Load ON" ? "Non-Essential Load ON" : "Priority Load ON";
  }
</script>

</body>
</html>
